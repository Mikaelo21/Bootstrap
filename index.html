<!DOCTYPE html>
<html lang="pt-BR" data-bs="dark">
<head>
    <meta charset="UTF-8">
    <style>
        
  .form-control {
    transition: 0.3s ease;
  }

  .form-control:hover {
    transform: scale(1.02);
    box-shadow: 0 0 8px rgba(0, 0, 0, 0.2);
  }
  option {
    animation: fade 0.5s ease;
  }



    </style>
    <title>Conversor de Medidas</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light p-4">
<div class="text-center">
    <div id="mensagem"></div>
    <h2>Conversor de Distância</h2>

    <input class="form-control w-center" type="number" id="valor" placeholder="Digite o valor">

    <select id="de"></select>
    <span>→</span>
    <select id="para"></select>

    <button onclick="converter()">Converter</button>

    <p id="resultado"></p>
    <h2>Conversor de Tempo</h2>

    <input class="form-control type="number" id="valorTempo" placeholder="Digite o valor">

    <select id="deTempo"></select>
    <span>→</span>
    <select id="paraTempo"></select>

    <button onclick="converterTempo()">Converter</button>

    <p id="resultadoTempo"></p>
    <h2>Conversor de Velocidade</h2>

    <input class="form-control type="number" id="valorVel" placeholder="Digite o valor">

    <select id="deVel"></select>
    <span>→</span>
    <select id="paraVel"></select>

    <button onclick="converterVel()">Converter</button>

    <p id="resultadoVel"></p>

</div>

    <script>
        // Unidade base: metro
        const unidades = {
            metros: 1,
            km: 1000,
            cm: 0.01,
            mm: 0.001,
            milha: 1609.34,
            jarda: 0.9144,
            pes: 0.3048
            
        };

        const deSelect = document.getElementById("de");
        const paraSelect = document.getElementById("para");

        // Preencher selects automaticamente
        function preencherSelects() {
            for (let unidade in unidades) {
                let option1 = new Option(unidade, unidade);
                let option2 = new Option(unidade, unidade);

                deSelect.add(option1);
                paraSelect.add(option2);
            }
        }

        preencherSelects();

        function converter() {
            const valor = parseFloat(document.getElementById("valor").value);
            const de = deSelect.value;
            const para = paraSelect.value;

            if (valor < 0 || isNaN(valor)) {
    document.getElementById("mensagem").innerHTML =
        `<div class="alert alert-danger" role="alert">
            Valor Inválido!
            
        </div>`;
    return;
}

            // Converter para metros (base)
            const emMetros = valor * unidades[de];

            // Converter para unidade final
            const resultado = emMetros / unidades[para];

            document.getElementById("resultado").innerText =
                `${valor} ${de} = ${resultado} ${para}`;
        }
        const unidadesTempo = {
            segundo: 1,
            minuto: 60,
            hora: 3600,
            dia: 86400,
            semana: 604800,
            mes: 2629800,   // média (30,44 dias)
            ano: 31557600   // média (365,25 dias)
        };

        const deTempo = document.getElementById("deTempo");
        const paraTempo = document.getElementById("paraTempo");

        function preencherTempo() {
            for (let unidade in unidadesTempo) {
                deTempo.add(new Option(unidade, unidade));
                paraTempo.add(new Option(unidade, unidade));
            }
        }

        preencherTempo();

        function converterTempo() {
            const valor = parseFloat(document.getElementById("valorTempo").value);
            const de = deTempo.value;
            const para = paraTempo.value;

            if (valor < 0 || isNaN(valor)) {
    document.getElementById("mensagem").innerHTML =
        `<div class="alert alert-danger" role="alert">
            Valor Inválido!
            
        </div>`;
    return;
}

            // converter para segundos (base)
            const emSegundos = valor * unidadesTempo[de];

            // converter para destino
            const resultado = emSegundos / unidadesTempo[para];

            document.getElementById("resultadoTempo").innerText =
                `${valor} ${de} = ${resultado} ${para}`;
        }
        const unidadesVel = {
            "m/s": 1,
            "km/h": 0.277778,
            "mph": 0.44704,
            "no": 0.514444   // nó (navio/avião)
        };

        const deVel = document.getElementById("deVel");
        const paraVel = document.getElementById("paraVel");

        function preencherVel() {
            for (let unidade in unidadesVel) {
                deVel.add(new Option(unidade, unidade));
                paraVel.add(new Option(unidade, unidade));
            }
        }

        preencherVel();

        function converterVel() {
            const valor = parseFloat(document.getElementById("valorVel").value);
            const de = deVel.value;
            const para = paraVel.value;

            if (valor < 0 || isNaN(valor)) {
    document.getElementById("mensagem").innerHTML =
        `<div class="alert alert-danger" role="alert">
            Valor Inválido!
            
        </div>`;
    return;
}else if(valor > 0 || isNaN(valor)){
    document.getElementById("mensagem").innerHTML = "";
    
}

            // converter para m/s (base)
            const emBase = valor * unidadesVel[de];

            // converter para destino
            const resultado = emBase / unidadesVel[para];

            document.getElementById("resultadoVel").innerText =
                `${valor} ${de} = ${resultado} ${para}`;
        }
    </script>

</body>
</html>
